<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Release Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
overflow:hidden;
background:#000;
color:white;
}

.background{

position:fixed;
width:100%;
height:100%;

background:url("background.jpg") center center/cover no-repeat;

filter:grayscale(100%);
transition:1s;

z-index:-2;

}

.overlay{

position:fixed;
width:100%;
height:100%;

background:linear-gradient(
180deg,
rgba(0,0,0,.55),
rgba(0,0,0,.75)
);

z-index:-1;

}

.container{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);

width:90%;
max-width:900px;

padding:45px;

text-align:center;

background:rgba(10,15,25,.45);

backdrop-filter:blur(20px);

border:1px solid rgba(0,255,255,.25);

border-radius:25px;

box-shadow:

0 0 50px rgba(0,255,255,.2),
0 0 100px rgba(0,255,255,.15);

}

h1{

font-size:60px;

letter-spacing:6px;

margin-bottom:20px;

text-shadow:

0 0 20px cyan,
0 0 40px cyan;

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{
text-shadow:
0 0 20px cyan;
}

to{

text-shadow:
0 0 40px cyan,
0 0 80px cyan;

}

}

#countdown{

font-size:65px;

font-weight:800;

margin:30px 0;

line-height:1.4;

}

.subtitle{

font-size:20px;

opacity:.8;

margin-top:10px;

}

.finished{

font-size:50px;

color:#00ffff;

text-shadow:

0 0 30px cyan;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.05);

}

}

.discord{

margin-top:25px;

font-size:26px;

color:white;

}

.discord a{

color:#00ffff;

text-decoration:none;

}

.particles{

position:absolute;
width:100%;
height:100%;
overflow:hidden;
left:0;
top:0;
pointer-events:none;

}

.dot{

position:absolute;

width:3px;
height:3px;

background:cyan;

border-radius:50%;

animation:float linear infinite;

opacity:.5;

}

@keyframes float{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-10vh);
}

}

</style>
</head>

<body>

<div class="background" id="bg"></div>
<div class="overlay"></div>

<div class="particles" id="particles"></div>

<div class="container">

<h1>RELEASE COUNTDOWN</h1>

<div id="countdown"></div>

<div class="subtitle">
07 / 17 / 2026 • 12:00 AM
</div>

</div>

<script>

const release=new Date("July 17, 2026 00:00:00").getTime();

const bg=document.getElementById("bg");

const countdown=document.getElementById("countdown");

const start=new Date().getTime();

const total=release-start;

function update(){

const now=new Date().getTime();

const distance=release-now;

if(distance<=0){

countdown.innerHTML=`
<div class="finished">
CHECK THE DOWNLOAD CHANNEL
</div>

<div class="discord">
<a href="https://discord.gg/bAWD6wWqhp">
https://discord.gg/bAWD6wWqhp
</a>
</div>
`;

bg.style.filter="grayscale(0%)";

return;

}

const days=Math.floor(distance/(1000*60*60*24));

const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

const mins=Math.floor((distance%(1000*60*60))/(1000*60));

const secs=Math.floor((distance%(1000*60))/1000);

countdown.innerHTML=
`${days}D ${hours}H ${mins}M ${secs}S`;

const progress=1-distance/total;

const gray=100-(progress*100);

bg.style.filter=`grayscale(${gray}%)`;

}

setInterval(update,1000);

update();

const particles=document.getElementById("particles");

for(let i=0;i<90;i++){

const d=document.createElement("div");

d.className="dot";

d.style.left=Math.random()*100+"%";

d.style.animationDuration=5+Math.random()*10+"s";

d.style.animationDelay=Math.random()*8+"s";

particles.appendChild(d);

}

</script>

</body>
</html>
